<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>La Panera — Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cream: #fdf6e3;
      --warm-brown: #5c3d2e;
      --gold: #c9a84c;
      --light-gold: #e8d5a3;
      --dark: #2c1a0e;
      --text-muted: #8b6f5e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background-color: var(--cream);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(92,61,46,0.06) 0%, transparent 50%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 2px;
      box-shadow: 0 2px 4px rgba(92,61,46,0.08), 0 20px 60px rgba(92,61,46,0.12), inset 0 0 0 1px rgba(201,168,76,0.2);
      width: 100%;
      max-width: 460px;
      overflow: hidden;
      animation: fadeUp 0.7s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-header {
      background: var(--warm-brown);
      padding: 2rem 2rem 1.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .logo-wrapper {
      position: relative;
      z-index: 1;
      display: inline-block;
      margin-bottom: 1rem;
    }
    .logo-wrapper img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid var(--gold);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      object-fit: cover;
      animation: float 3s ease-in-out infinite;
      display: block;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }
    .card-header h1 {
      font-family: 'Playfair Display', serif;
      color: var(--light-gold);
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      position: relative;
      z-index: 1;
    }
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0.75rem auto 0;
      position: relative;
      z-index: 1;
    }
    .card-body { padding: 2.5rem 2rem; }
    .field-group { margin-bottom: 1.5rem; }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--warm-brown);
      margin-bottom: 0.5rem;
    }
    input[type="text"], input[type="tel"] {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1.5px solid var(--light-gold);
      border-radius: 2px;
      background: var(--cream);
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      color: var(--dark);
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
      outline: none;
    }
    input::placeholder { color: #c4aa90; font-style: italic; }
    input:focus {
      border-color: var(--gold);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    }
    .btn-submit {
      width: 100%;
      padding: 1rem;
      background: var(--warm-brown);
      color: var(--light-gold);
      border: none;
      border-radius: 2px;
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.25s, transform 0.15s, box-shadow 0.25s;
      margin-top: 0.5rem;
    }
    .btn-submit:hover {
      background: var(--dark);
      box-shadow: 0 4px 20px rgba(92,61,46,0.25);
      transform: translateY(-1px);
    }
    .success-msg {
      display: none;
      text-align: center;
      padding: 1.5rem 0 0.5rem;
      animation: fadeUp 0.5s ease both;
    }
    .success-msg h2 { font-family: 'Playfair Display', serif; color: var(--warm-brown); font-size: 1.4rem; margin-bottom: 0.5rem; }
  </style>
</head>

      <h1>La Panera</h1>
      <p>Panadería Artesanal</p>
      <div class="divider"></div>
    </div>

    <div class="card-body">
      <form id="panaderia-form">
        <div class="field-group">
          <label for="nombre">Nombre Completo</label>
          <input type="text" id="nombre" name="nombre" placeholder="Ej. María García" required autocomplete="off"/>
        </div>
        
        <div class="field-group">
          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" name="telefono" placeholder="Ej. 3312345678" required autocomplete="off"/>
        </div>

        <button type="submit" class="btn-submit">Registrarme →</button>
      </form>

      <div class="success-msg" id="success">
        <span class="check" style="font-size: 2.5rem; display: block; margin-bottom: 0.75rem;">✅</span>
        <h2 id="success-name"></h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.6;">Tu registro fue recibido.<br/>¡Pronto tendremos pan fresco para ti!</p>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('panaderia-form');
    const successMsg = document.getElementById('success');
    const successName = document.getElementById('success-name');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const nombre = document.getElementById('nombre').value.trim();
      const telefono = document.getElementById('telefono').value.trim();
      
      if (!nombre || !telefono) return;

      const btn = form.querySelector('.btn-submit');
      btn.textContent = 'Registrando...';
      btn.disabled = true;

      try {
        await fetch('https://wayneindustries.org/webhook-test/panaderia-registro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, telefono })
        });
      } catch (err) {
        console.warn('Error en el registro:', err);
      }

      form.style.display = 'none';
      successName.textContent = '¡Gracias, ' + nombre + '!';
      successMsg.style.display = 'block';
    });
  </script>
</body>
